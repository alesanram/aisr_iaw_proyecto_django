<!-- department_confirm_delete.html -->
{% extends 'plant.html' %}

{% block title %}Eliminar Departamento{% endblock %}

{% block content %}
  <h1>¿Estás seguro de que deseas eliminar el departamento "{{ departamento.nombre }}"?</h1>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar Eliminación</button>
    <a href="{% url 'departamento_lista' %}">Cancelar</a>
  </form>
{% endblock %}
