{% extends 'plant.html' %}
{% block title %}Eliminar Departamento{% endblock %}
{% block content %}
    <h1 class="mb-4 text-danger">Eliminar Departamento</h1>
    <div class="alert alert-warning">
    ¿Estás seguro de que deseas eliminar el departamento "{{ departamento.nombre }}"?
    </div>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirmar</button>
        <a href="{% url 'departamento_lista' %}" class="btn btn-secondary">Cancelar</a>
    </form>
{% endblock %}
