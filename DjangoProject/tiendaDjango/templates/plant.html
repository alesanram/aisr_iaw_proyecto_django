<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: #333;
            overflow: hidden;
        }
        nav a {
            float: left;
            display: block;
            color: white;
            padding: 14px 20px;
            text-align: center;
            text-decoration: none;
        }
        nav a:hover {
            background-color: #ddd;
            color: black;
        }
        main {
            display: flex;
            padding: 20px;
        }
        aside {
            width: 25%;
            padding: 20px;
            background-color: #f4f4f4;
        }
        section {
            flex-grow: 1;
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

<header>
    <h1>Django en </h1>
</header>

<nav>
     <a href="{% url 'welcome' %}">Inicio</a>
    <a href="{% url 'departamento_lista' %}">Departamentos</a>
    <a href="{% url 'departamento_create' %}">Crear Departamento</a>
</nav>

<main>
    <aside>
        <h3>Menú lateral</h3>
        <ul>
            <li><a href="#">Opción 1</a></li>
        </ul>
    </aside>

    <section>
        {% block content %}
        {% endblock %}
    </section>
</main>

<footer>
    <p>&copy; 2026 Mi Página Web. Todos los derechos reservados.</p>
</footer>

</body>
</html>
